name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.8", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 显示版本
        run: |
          python3 --version
          uname -a

      - name: 装测试依赖
        run: python3 -m pip install --upgrade pip && pip install -r tests/requirements.txt

      - name: 跑 pytest
        run: python3 -m pytest tests/ -v

      - name: 校验 CLI 能跑起来(--help 不依赖网络)
        run: python3 skills/mockplus-context/scripts/mockplus.py --help
